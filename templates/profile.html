{% extends 'base.html' %}
{% block content %}
<div class="profile-container">
    <div class="center-box profile-card">
        <h2>🛠️ Update Profile Configuration</h2>
        <form action="{{ url_for('profile') }}" method="POST">
            <div class="form-group">
                <label>Update Username</label>
                <input type="text" name="username" value="{{ current_user.username }}" required>
            </div>
            <div class="form-group">
                <label>Update Email Address</label>
                <input type="email" name="email" value="{{ current_user.email }}" required>
            </div>
            <button type="submit" class="btn-primary">Apply Modifications</button>
        </form>
    </div>
</div>
{% endblock %}
