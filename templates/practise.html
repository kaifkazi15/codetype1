{% extends 'base.html' %}
{% block content %}
<div class="practice-container">
    <div class="live-stats">
        <div>Timer: <span id="timer" class="stat-highlight">60</span>s</div>
        <div>WPM: <span id="wpm" class="stat-highlight">0</span></div>
        <div>Accuracy: <span id="accuracy" class="stat-highlight">100</span>%</div>
    </div>

    <div class="selector-bar">
        <label for="lang-select">Language: </label>
        <select id="lang-select">
            <option value="python">Python</option>
            <option value="javascript">JavaScript</option>
        </select>
    </div>

    <div id="code-display" class="code-editor-box"></div>
    <textarea id="code-input" placeholder="Yahan dekh kar type karna shuru karein..." autofocus></textarea>
    <button id="reset-btn" class="btn-secondary">Reset Test</button>
</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
{% endblock %}
